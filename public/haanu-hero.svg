<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Soft glow blobs -->
  <circle cx="220" cy="180" r="180" fill="#10b981" opacity="0.12" filter="url(#glow)"/>
  <circle cx="980" cy="540" r="160" fill="#0d9488" opacity="0.10" filter="url(#glow)"/>

  <!-- Window chrome -->
  <rect x="100" y="80" width="1000" height="540" rx="16" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
  <rect x="100" y="80" width="1000" height="44" rx="16" fill="#111827"/>
  <circle cx="130" cy="102" r="6" fill="#ef4444"/>
  <circle cx="152" cy="102" r="6" fill="#f59e0b"/>
  <circle cx="174" cy="102" r="6" fill="#10b981"/>
  <text x="600" y="107" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Haanu Agent — Live Session</text>

  <!-- Sidebar -->
  <rect x="100" y="124" width="240" height="496" fill="#0a0f1d"/>
  <rect x="120" y="148" width="200" height="40" rx="8" fill="#1e293b" opacity="0.6"/>
  <text x="135" y="173" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">+ New chat</text>

  <rect x="120" y="208" width="200" height="44" rx="8" fill="#10b981" opacity="0.10"/>
  <text x="135" y="235" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#10b981">Sign up for GitHub</text>
  <rect x="120" y="262" width="200" height="44" rx="8" fill="#1e293b" opacity="0.4"/>
  <text x="135" y="289" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#94a3b8">Research EU AI Act</text>
  <rect x="120" y="316" width="200" height="44" rx="8" fill="#1e293b" opacity="0.4"/>
  <text x="135" y="343" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#94a3b8">Browse Amazon</text>

  <!-- Main chat area -->
  <!-- User message bubble -->
  <rect x="380" y="170" width="680" height="60" rx="14" fill="url(#accent)"/>
  <text x="410" y="206" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#ffffff">Go to github.com and sign up for a new account</text>

  <!-- Assistant avatar + bubble -->
  <rect x="380" y="260" width="44" height="44" rx="10" fill="url(#logoG)"/>
  <circle cx="394" cy="276" r="3.5" fill="#ffffff"/>
  <circle cx="410" cy="276" r="3.5" fill="#ffffff"/>
  <rect x="390" y="288" width="24" height="2" rx="1" fill="#ffffff" opacity="0.85"/>

  <rect x="436" y="260" width="624" height="120" rx="14" fill="#1e293b" opacity="0.7"/>
  <text x="456" y="290" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#e2e8f0">On it — opening github.com in the browser now.</text>
  <text x="456" y="312" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">I'll fill in the sign-up form, verify the email field, and report</text>
  <text x="456" y="330" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">back once the account is created.</text>

  <!-- Tool step card -->
  <rect x="436" y="400" width="624" height="60" rx="12" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="452" y="416" width="28" height="28" rx="6" fill="#0ea5e9" opacity="0.18"/>
  <text x="492" y="436" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#e2e8f0">Open Website</text>
  <text x="492" y="452" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#94a3b8">Opening: https://github.com</text>

  <!-- Browser screenshot preview -->
  <rect x="436" y="480" width="624" height="120" rx="12" fill="#0f172a" stroke="#1e293b"/>
  <rect x="436" y="480" width="624" height="28" rx="12" fill="#1e293b"/>
  <text x="452" y="498" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#94a3b8">Browser View</text>
  <rect x="460" y="524" width="576" height="60" rx="6" fill="#0b1220"/>
  <text x="700" y="560" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">github.com — live preview</text>

  <!-- Input bar -->
  <rect x="380" y="620" width="680" height="44" rx="12" fill="#1e293b" opacity="0.6"/>
  <text x="400" y="647" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">Ask Haanu to do anything...</text>
  <rect x="1020" y="628" width="28" height="28" rx="6" fill="url(#accent)"/>
</svg>
